<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjama</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <!-- ── Top bar ─────────────────────────────────────────── -->
  <header>
    <div class="brand">
      <span class="logo">&#x062A;</span>
      <div>
        <h1>Tarjama</h1>
        <p class="subtitle">Smart Translator</p>
      </div>
    </div>
    <button id="settings-btn" class="ghost-btn" title="Settings" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65
          1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0
          9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0
          4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65
          0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65
          0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0
          1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65
          0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ── Settings drawer ─────────────────────────────────── -->
  <div id="settings-overlay" class="overlay hidden"></div>
  <aside id="settings-drawer" class="drawer hidden">
    <div class="drawer-header">
      <h2>Settings</h2>
      <button id="close-settings" class="ghost-btn" aria-label="Close settings">&times;</button>
    </div>
    <div class="drawer-body">
      <label for="api-key">Gemini API Key</label>
      <div class="api-key-row">
        <input id="api-key" type="password" placeholder="Paste your key here" autocomplete="off" spellcheck="false" />
        <button id="toggle-key-btn" class="ghost-btn toggle-vis" title="Show / Hide">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button id="save-key-btn" class="primary-btn small">Save key</button>
      <p id="key-status" class="key-status"></p>
    </div>
  </aside>

  <!-- ── Main content ────────────────────────────────────── -->
  <main>
    <!-- Source card -->
    <section class="card source-card">
      <div class="lang-bar" id="source-lang-bar" role="group" aria-label="Source language">
        <button class="lang-pill active" data-lang="auto">Auto</button>
        <button class="lang-pill" data-lang="en">English</button>
        <button class="lang-pill" data-lang="fr">Français</button>
        <button class="lang-pill" data-lang="es">Español</button>
        <button class="lang-pill" data-lang="ar">Arabic</button>
        <button class="lang-pill" data-lang="drj">Darija</button>
        <button id="clear-btn" class="clear-btn" title="Clear">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <textarea
        id="source-text"
        placeholder="Right-click selected text and choose Tarjama, or type here..."
        rows="5"
      ></textarea>
    </section>

    <!-- Translate row -->
    <div class="action-row">
      <button id="translate-btn" class="primary-btn translate-btn">
        <span class="btn-label">Translate</span>
        <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
      <button id="swap-btn" class="ghost-btn swap-btn" title="Swap languages">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>

    <!-- Result card -->
    <section class="card result-card">
      <div class="lang-bar" id="target-lang-bar" role="group" aria-label="Target language">
        <button class="lang-pill" data-lang="en">English</button>
        <button class="lang-pill" data-lang="fr">Français</button>
        <button class="lang-pill" data-lang="es">Español</button>
        <button class="lang-pill" data-lang="ar">Arabic</button>
        <button class="lang-pill active" data-lang="drj">Darija</button>
        <button id="copy-btn" class="ghost-btn copy-btn" title="Copy" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div id="result-text" class="result-box" dir="rtl" lang="ar">
        <span class="placeholder">Translation will appear here</span>
      </div>
    </section>

    <div id="status" class="toast" hidden></div>
  </main>

  <script src="sidepanel.js"></script>
</body>
</html>
