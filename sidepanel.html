<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjama</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <h1>Tarjama</h1>
    <p class="subtitle">English &rarr; Darija</p>
  </header>

  <main>
    <section class="api-key-section">
      <label for="api-key">Gemini API Key</label>
      <div class="api-key-row">
        <input
          id="api-key"
          type="password"
          placeholder="Enter your Gemini API key"
          autocomplete="off"
        />
        <button id="toggle-key-btn" class="icon-btn" title="Show / Hide key">&#x1f441;</button>
        <button id="save-key-btn" class="icon-btn save" title="Save key">&#x2713;</button>
      </div>
      <p id="key-status" class="key-status"></p>
    </section>

    <section class="input-section">
      <label for="source-text">English</label>
      <textarea
        id="source-text"
        placeholder="Select text on any page and right-click &#x2192; Tarjama, or type here..."
        rows="5"
      ></textarea>
      <button id="translate-btn">Translate</button>
    </section>

    <section class="output-section">
      <label for="result-text">Darija</label>
      <div id="result-text" class="result-box" dir="rtl" lang="ar">
        <span class="placeholder">Translation will appear here</span>
      </div>
      <button id="copy-btn" class="secondary" disabled>Copy</button>
    </section>

    <div id="status" class="status" hidden></div>
  </main>

  <script src="sidepanel.js"></script>
</body>
</html>
